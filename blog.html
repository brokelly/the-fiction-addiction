    <!-- Navigation -->
    <nav class="top-nav">

            <li><a href="index.html">Home</a></li>

    <div class="content">

        <h1 class="whimsical-text">Blog and Discussions</h1>

        <div class="container">

            <h2>Share Your Thoughts</h2>

            <label for="blogTitle">Title</label>
            <input
                type="text"
                id="blogTitle"
                placeholder="Enter your blog title">

            <label for="blogAuthor">Username</label>
            <input
                type="text"
                id="blogAuthor"
                placeholder="Enter your username">

            <label for="blogContent">
                Drop some thoughts like they're hot!
            </label>

            <textarea
                id="blogContent"
                rows="6"
                placeholder="Write your blog post here..."></textarea>

            <button
                class="open-btn"
                onclick="submitBlogPost()">
                Submit Blog Post
            </button>

            <h2>Preview</h2>

            <div id="blogDisplay">
                Your blog post will appear here.
            </div>

        </div>

    </div>

    <footer class="foot">
